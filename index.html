<!DOCTYPE html>
<html>

<head>
    <meta charset=“UTF-8”>
    <!--↓styleタグでCSS設定-->
    <style>
        .title {
            color: red;
        }
    </style>
    <!--↓cssファイルの読み込み-->
    <link rel="stylesheet" href="css/style.css">
    <!--↓javaScriptファイルの読み込み。jsファイルはheadタグ内かbodyタグ内に定義する-->
    <!--※ただし、DOMのレンダリングは上から下に処理するので記述する場所によって処理のタイミングが変わることに注意-->
    <script src="js/common.js"></script>
    <title>サンプルページ</title>
</head>

<body>
    <h1 class="title">こんにちは！</h1>
    <!--↓style属性でタグに直接CSSを適用-->
    <p style="color: blue;">文章１</p>
    <p class="fontColorGreen">文章２</p>
    <div>
        <p id="unique">文章３</p>
        <p class="fontColorGreen fontSize50">文章４</p>
    </div>

    <!--↓javascriptサンプル-->
    <button id="button">ボタン</button>
    <script>
        // idをキーに対象のボタンを取得
        const button = document.getElementById("button");

        // ボタンのクリック時のイベントリスナーに関数：buttonClickを追加
        button.addEventListener("click", buttonClick);

        // 関数定義
        function buttonClick() {
            // アラート出力
            alert("ボタンがクリックされました");
        }
    </script>

    <!--オンフォーカス、オンブラーに関数を設定。jsの処理はcommon.jsに記述-->
    <input type="text" onfocus="over(this)" onblur="leave(this)">
    <!--↑javascriptサンプル-->
</body>

</html>
